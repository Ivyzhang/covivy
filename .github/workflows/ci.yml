name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  COVIVY_BASE_URL: ${{ vars.COVIVY_BASE_URL }}
  COVIVY_UPLOAD_TOKEN: ${{ secrets.COVIVY_UPLOAD_TOKEN }}

jobs:
  static-check:
    name: "Static Check: Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          npm ci

      - name: Check syntax and lint
        run: python -m ruff check app tests scripts alembic

  test-with-coverage:
    name: Test with Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          npm ci

      - name: Run tests with coverage data
        run: |
          mkdir -p coverage-data
          python -m coverage run --data-file coverage-data/coverage.db -m unittest discover -s tests

      - name: Upload coverage data
        uses: actions/upload-artifact@v4
        with:
          name: coverage-data
          path: coverage-data/coverage.db
          if-no-files-found: error

  generate-coverage-report:
    name: Generate Coverage Report
    runs-on: ubuntu-latest
    needs: test-with-coverage
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Download coverage data
        uses: actions/download-artifact@v4
        with:
          name: coverage-data
          path: coverage-data

      - name: Generate coverage report
        run: |
          python -m coverage report --data-file coverage-data/coverage.db
          python -m coverage xml --data-file coverage-data/coverage.db -o coverage.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          if-no-files-found: error

  covivy-coverage:
    name: Covivy Coverage
    runs-on: ubuntu-latest
    needs: generate-coverage-report
    steps:
      - uses: actions/checkout@v4

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report

      - name: Upload coverage to covivy
        if: (github.event_name == 'pull_request' || github.event_name == 'push') && env.COVIVY_UPLOAD_TOKEN != '' && env.COVIVY_BASE_URL != ''
        uses: ./upload-action
        with:
          token: ${{ env.COVIVY_UPLOAD_TOKEN }}
          base-url: ${{ env.COVIVY_BASE_URL }}
          coverage-file: coverage.xml
          format: cobertura

      - name: Skip covivy upload when not configured
        if: env.COVIVY_UPLOAD_TOKEN == '' || env.COVIVY_BASE_URL == ''
        run: echo "COVIVY_BASE_URL or COVIVY_UPLOAD_TOKEN is not configured; skipping covivy upload."
