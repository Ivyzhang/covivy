name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  COVIVY_BASE_URL: ${{ vars.COVIVY_BASE_URL }}
  COVIVY_UPLOAD_TOKEN: ${{ secrets.COVIVY_UPLOAD_TOKEN }}

jobs:
  static-check:
    name: "Static-check: Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          npm ci

      - name: Check syntax and lint
        run: python -m ruff check app tests scripts alembic

  test-with-coverage:
    name: Test with coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          npm ci

      - name: Run tests with coverage data
        run: python -m coverage run -m unittest discover -s tests

      - name: Generate coverage report
        run: |
          python -m coverage report
          python -m coverage xml -o coverage.xml

      - name: Upload coverage to covivy
        if: (github.event_name == 'pull_request' || github.event_name == 'push') && env.COVIVY_UPLOAD_TOKEN != '' && env.COVIVY_BASE_URL != ''
        uses: ./upload-action
        with:
          token: ${{ env.COVIVY_UPLOAD_TOKEN }}
          base-url: ${{ env.COVIVY_BASE_URL }}
          coverage-file: coverage.xml
          format: cobertura

      - name: Skip covivy upload when not configured
        if: env.COVIVY_UPLOAD_TOKEN == '' || env.COVIVY_BASE_URL == ''
        run: echo "COVIVY_BASE_URL or COVIVY_UPLOAD_TOKEN is not configured; skipping covivy upload."
